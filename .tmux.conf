######################
#### MAIN CONFIG #####
######################

# Fix terminal color support — tmux-256color enables true color (24-bit) pass-through.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start sessions and panes with index 1; renumber windows when one is closed
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set vi mode
set-window-option -g mode-keys vi

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Disable mouse mode (tmux 2.1 and above)
set -g mouse off

# Fix vim clipboard in macOS — reattach-to-user-namespace no longer needed (tmux 2.6+)

# fix slow Esc via https://github.com/tmux/tmux/issues/353#issuecomment-294570322
# No delay for escape key press (10ms avoids alt-key timing edge cases)
set -sg escape-time 10
# set -g focus-events on

######################
### DESIGN CHANGES ###
######################

# Colour reference:
#   colour234 = bg dark grey (status bar background)
#   colour137 = fg tan       (status bar foreground)
#   colour238 = mid grey     (selected window bg, mode bg)
#   colour235 = dark grey    (pane border bg)
#   colour241/245 = status-right segment backgrounds
#   colour135 = purple       (clock)
#   colour196 = red          (mode fg highlight)
#   colour51  = cyan         (active pane border fg)
#   colour81  = light blue   (current window fg)

# panes

## Status bar design
# status line
# set -g status-utf8 on
set -g status-justify left
set -g status-interval 2

# messaging
set -g message-command-style fg=blue,bg=black

#window mode

# Info on left (I don't have a session display for now)
set -g status-left ''

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# The modes {
setw -g clock-mode-colour colour135
setw -g mode-style fg=colour196,bg=colour238,bold

# }
# The panes {

set -g pane-border-style fg=colour238,bg=colour235
set -g pane-active-border-style fg=colour51,bg=colour236

# }
# The statusbar {

set -g status-position bottom
set -g status-style fg=colour137,bg=colour234,dim
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style fg=colour81,bg=colour238,bold,dim
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style bold,fg=colour255,bg=colour1

# }
# The messages {

set -g message-style fg=colour232,bg=colour166,bold

# }
